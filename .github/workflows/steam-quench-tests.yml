# ════════════════════════════════════════════════════════════════════════════
# .github/workflows/steam-quench-tests.yml
# Steam Quench / Desuperheater Calculator — Automated API Test Suite
# ════════════════════════════════════════════════════════════════════════════

name: Steam Quench API Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:
    inputs:
      base_url:
        description: 'Override API base URL (e.g. Vercel preview URL)'
        required: false
        default: 'https://multicalci.com'

concurrency:
  group: steam-quench-tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Run Steam Quench API Tests
    runs-on: ubuntu-latest
    timeout-minutes: 10

    env:
      BASE_URL: ${{ github.event.inputs.base_url || 'https://www.multicalci.com' }}
      NODE_ENV: test

    steps:

      # ── 1. Checkout repo ────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Setup Node.js ─────────────────────────────────────────────────
      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # ── 3. Create package.json and install deps ───────────────────────────
      # testMatch scoped to stem-quench only so heatxpert.test.js is NOT picked up
      - name: Install Jest and dependencies
        run: |
          cat > package.json << 'EOF'
          {
            "name": "multicalci-steam-quench-tests",
            "version": "1.0.0",
            "private": true,
            "scripts": {
              "test": "jest --forceExit"
            },
            "jest": {
              "testEnvironment": "node",
              "testMatch": ["**/steam-quench.test.js"],
              "testTimeout": 30000,
              "reporters": [
                "default",
                ["jest-junit", {
                  "outputDirectory": "test-results",
                  "outputName": "steam-quench-results.xml"
                }]
              ]
            }
          }
          EOF
          npm install --save-dev jest jest-junit node-fetch

      # ── 4. Copy ONLY the steam-quench test file ───────────────────────────
      - name: Prepare test file
        run: |
          cp .github/tests/steam-quench.test.js ./steam-quench.test.js
          echo "Target API: $BASE_URL/api/steam-quench"

      # ── 5. Smoke-check API reachability ───────────────────────────────────
      - name: Smoke-check API reachability
        run: |
          BODY='{"P_s":30,"T1":280,"Tw":80,"Pw":40,"T2":250,"m_in":40000,"sh_min":10,"f_min":30,"f_max":110,"cv_in":0}'
          RESPONSE=$(curl -s -L \
            -X POST "$BASE_URL/api/steam-quench" \
            -H "Content-Type: application/json" \
            -d "$BODY" \
            -w "\n__STATUS__%{http_code}" \
            --max-time 25)
          STATUS=$(echo "$RESPONSE" | grep "__STATUS__" | sed 's/__STATUS__//')
          BODY_OUT=$(echo "$RESPONSE" | grep -v "__STATUS__")
          echo "HTTP status : $STATUS"
          echo "Response    : ${BODY_OUT:0:400}"
          if [ "$STATUS" != "200" ]; then
            echo "::error::API returned HTTP $STATUS. Check vercel.json routing."
            exit 1
          fi
          echo "API reachable ✅"

      # ── 6. Run tests ──────────────────────────────────────────────────────
      # --testPathPattern anchored to exact filename prevents Jest from
      # picking up heatxpert.test.js or any other .test.js in the workspace.
      - name: Run Steam Quench test suite
        run: |
          mkdir -p test-results
          npx jest --testPathPatterns="steam-quench\.test\.js$" --forceExit --verbose --ci
        env:
          BASE_URL: ${{ env.BASE_URL }}

      # ── 7. Upload XML report ───────────────────────────────────────────────
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: steam-quench-test-results-${{ github.run_number }}
          path: test-results/steam-quench-results.xml
          retention-days: 30

      # ── 8. Print failure summary ───────────────────────────────────────────
      - name: Print failure summary
        if: failure()
        run: |
          echo "════════════════════════════════════════"
          echo "  STEAM QUENCH TESTS FAILED"
          echo "  Target : $BASE_URL"
          echo "  Commit : ${{ github.sha }}"
          echo "  Branch : ${{ github.ref_name }}"
          echo "════════════════════════════════════════"
