# ════════════════════════════════════════════════════════════════════════════
# .github/workflows/heatxpert-tests.yml
# HeatXpert Pro — Automated API Test Suite
# ════════════════════════════════════════════════════════════════════════════

name: HeatXpert Pro API Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:
    inputs:
      base_url:
        description: 'Override API base URL (e.g. Vercel preview URL)'
        required: false
        default: 'https://multicalci.com'

concurrency:
  group: heatxpert-tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Run HeatXpert API Tests
    runs-on: ubuntu-latest
    timeout-minutes: 10

    env:
      BASE_URL: ${{ github.event.inputs.base_url || 'https://www.multicalci.com' }}
      NODE_ENV: test

    steps:

      # ── 1. Checkout repo ────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Setup Node.js ─────────────────────────────────────────────────
      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # ── 3. Create package.json and install deps ───────────────────────────
      - name: Install Jest and dependencies
        run: |
          cat > package.json << 'EOF'
          {
            "name": "multicalci-heatxpert-tests",
            "version": "1.0.0",
            "private": true,
            "scripts": {
              "test": "jest --forceExit"
            },
            "jest": {
              "testEnvironment": "node",
              "testMatch": ["**/*.test.js"],
              "testTimeout": 30000,
              "reporters": [
                "default",
                ["jest-junit", {
                  "outputDirectory": "test-results",
                  "outputName": "heatxpert-results.xml"
                }]
              ]
            }
          }
          EOF
          npm install --save-dev jest jest-junit node-fetch

      # ── 4. Copy test file into working directory ──────────────────────────
      - name: Prepare test file
        run: |
          cp .github/tests/heatxpert.test.js ./heatxpert.test.js
          echo "Target API: $BASE_URL/api/heatxpert"

      # ── 5. Smoke-check API reachability ───────────────────────────────────
      # -L flag follows 307/308 redirects (Vercel trailingSlash redirect)
      # -X POST is re-sent after redirect with --post301/302/303 not needed
      # because Vercel 307 preserves POST method automatically
      - name: Smoke-check API reachability
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" -L \
            -L \
            -X POST "$BASE_URL/api/heatxpert" \
            -H "Content-Type: application/json" \
            -d '{"calcType":"fouling","Rf_s":0.0002,"Rf_t":0.0002,"U_cl":800}' \
            --max-time 20)
          echo "HTTP status: $STATUS"
          if [ "$STATUS" != "200" ]; then
            echo "API returned $STATUS — aborting"
            exit 1
          fi
          echo "API reachable and returning 200"

      # ── 6. Run tests ──────────────────────────────────────────────────────
      - name: Run HeatXpert test suite
        run: |
          mkdir -p test-results
          npx jest heatxpert.test.js --forceExit --verbose --ci
        env:
          BASE_URL: ${{ env.BASE_URL }}

      # ── 7. Upload XML report ───────────────────────────────────────────────
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: heatxpert-test-results-${{ github.run_number }}
          path: test-results/heatxpert-results.xml
          retention-days: 30

      # ── 8. Print failure summary ───────────────────────────────────────────
      - name: Print failure summary
        if: failure()
        run: |
          echo "════════════════════════════════════════"
          echo "  HEATXPERT TESTS FAILED"
          echo "  Target : $BASE_URL"
          echo "  Commit : ${{ github.sha }}"
          echo "  Branch : ${{ github.ref_name }}"
          echo "════════════════════════════════════════"
